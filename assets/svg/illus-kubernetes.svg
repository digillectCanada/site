<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#0e0f13"/>
  <!-- k8s hex cluster -->
  <polygon points="160,30 195,50 195,90 160,110 125,90 125,50" fill="none" stroke="#00c8ff" stroke-width="1.4" opacity="0.7"/>
  <!-- inner node -->
  <circle cx="160" cy="70" r="12" fill="none" stroke="#00c8ff" stroke-width="1.2" opacity="0.8"/>
  <text x="160" y="75" text-anchor="middle" font-family="monospace" font-size="9" fill="#00c8ff" opacity="0.9">K8s</text>
  <!-- satellite pods (yellow) -->
  <circle cx="160" cy="130" r="8" fill="none" stroke="#ffe600" stroke-width="1.1"/>
  <circle cx="210" cy="148" r="8" fill="none" stroke="#ffe600" stroke-width="1.1"/>
  <circle cx="110" cy="148" r="8" fill="none" stroke="#ffe600" stroke-width="1.1"/>
  <!-- satellite pods (blue) -->
  <circle cx="240" cy="105" r="8" fill="none" stroke="#00c8ff" stroke-width="1.1" opacity="0.6"/>
  <circle cx="80"  cy="105" r="8" fill="none" stroke="#00c8ff" stroke-width="1.1" opacity="0.6"/>
  <circle cx="220" cy="42"  r="8" fill="none" stroke="#00c8ff" stroke-width="1.1" opacity="0.6"/>
  <circle cx="100" cy="42"  r="8" fill="none" stroke="#00c8ff" stroke-width="1.1" opacity="0.6"/>
  <!-- connectors (yellow pods) -->
  <line x1="160" y1="110" x2="160" y2="122" stroke="#ffe600" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7"/>
  <line x1="160" y1="110" x2="202" y2="140" stroke="#ffe600" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7"/>
  <line x1="160" y1="110" x2="118" y2="140" stroke="#ffe600" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7"/>
  <!-- connectors (blue pods) -->
  <line x1="195" y1="70" x2="232" y2="105" stroke="#00c8ff" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="125" y1="70" x2="88"  y2="105" stroke="#00c8ff" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="180" y1="37" x2="212" y2="42"  stroke="#00c8ff" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="140" y1="37" x2="108" y2="42"  stroke="#00c8ff" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.4"/>
</svg>
